    <style>
        /* ----- Reset & Fullscreen ----- */
        * {
            box-sizing: border-box;
        }
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;

        /* ----- Background iFrame (Game Site) ----- */
        iframe#gameFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;

        /* ----- Signal Box (Draggable) ----- */
        .box {
            width: 140px; /* একটু বাড়ানো হয়েছে নতুন বাটন এড করার জন্য */
            min-height: 150px;
            background: linear-gradient(145deg, #0f0f1e, #1a1a2e);
            border: 2px solid #00ffff;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5), inset 0 0 20px rgba(0, 255, 255, 0.15);
            color: #e0f0ff;
            text-align: center;
            padding: 12px 8px 10px;
            position: fixed;
            top: 60px;
            left: 50px;
            z-index: 9999;
            cursor: move;
            user-select: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: borderPulse 3.5s ease-in-out infinite;
            touch-action: none;
            transition: box-shadow 0.3s;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: #00ffff; }
            50% { border-color: #ff44ff; }
        }

        /* ----- Login Section ----- */
        #loginPart .title {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(90deg, #00ffff, #ff44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        #loginPart input {
            width: 90%;
            padding: 6px;
            background: #0a0a18;
            border: 1.5px solid #00ccdd;
            border-radius: 8px;
            color: #00ffff;
            font-size: 12px;
            text-align: center;
            outline: none;
            margin-bottom: 5px;
        }
        #loginPart button {
            padding: 6px 15px;
            background: linear-gradient(135deg, #00ccff, #0066ff);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        /* নতুন স্টাইল (লিঙ্ক বাটন) */
        .tg-link {
            display: block;
            margin-top: 8px;
            font-size: 10px;
            color: #fff;
            text-decoration: none;
            background: rgba(0, 255, 255, 0.1);
            padding: 4px;
            border-radius: 5px;
            border: 1px solid #00ffff;
            transition: 0.3s;
        }
        .tg-link:hover {
            background: #00ffff;
            color: #000;
        }
        .channel-btn {
            border-color: #ff44ff;
            color: #ff44ff;
        }
        .channel-btn:hover {
            background: #ff44ff;
            color: #fff;
        }

        #wrong {
            color: #ff3366;
            font-size: 10px;
            font-weight: 700;
            display: none;
            margin-top: 5px;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* ----- Signal Section ----- */
        #signalPart .title {
            font-size: 13px;
            font-weight: 800;
            background: linear-gradient(90deg, #00ffff, #ff44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
        }
        #signalPart .countdown {
            font-size: 18px;
            color: #ffdd44;
            font-weight: 800;
        }
        #signalPart .signal {
            font-size: 24px;
            font-weight: 900;
            color: #00ffaa;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.5);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .box { width: 130px; }
        }
    </style>
</head>
<body>

    <!-- MAIN GAME iFRAME -->
    <iframe id="gameFrame" src="https://dkwin9.com/#/register?invitationCode=221671743887"></iframe>

    <!-- SIGNAL BOX -->
    <div class="box" id="signalBox">

        <!-- LOGIN PART -->
        <div id="loginPart">
            <div class="title">⚡ 3X Sabbir</div>
            <input type="password" id="passInput" placeholder="Password Here" autocomplete="off" />
            <button id="loginBtn">Unlock</button>
            <div id="wrong">✗ Invalid Password!</div>
            
            <!-- পাসওয়ার্ড নেওয়ার লিঙ্ক -->
            <a href="https://t.me/sabbir2850" target="_blank" class="tg-link">পাসওয়ার্ড নিতে মেসেজ দিন</a>
            <!-- টেলিগ্রাম চ্যানেল লিঙ্ক -->
            <a href="https://t.me/+LZQpOI9nzItmOGU1" target="_blank" class="tg-link channel-btn">টেলিগ্রাম চ্যানেল জয়েন</a>
        </div>

        <!-- SIGNAL PART -->
        <div id="signalPart" style="display:none;">
            <div class="title">⚡ 3X Sabbir</div>
            <div id="currentTime" style="font-size: 10px; color: #88aacc;">--:--:--</div>
            <div class="countdown"><span id="countdown">30</span>s</div>
            <div class="signal" id="predicted">-</div>
            <!-- জয়েন চ্যানেল বাটন সিগন্যাল পার্টেও রাখা হলো যাতে ইউজার পরে জয়েন করতে পারে -->
            <a href="https://t.me/+LZQpOI9nzItmOGU1" target="_blank" class="tg-link channel-btn">Join Telegram</a>
        </div>
    </div>

    <script>
        // PASSWORD
        const CORRECT_PASSWORD = '3X Sabbir';

        const loginPart = document.getElementById('loginPart');
        const signalPart = document.getElementById('signalPart');
        const passInput = document.getElementById('passInput');
        const loginBtn = document.getElementById('loginBtn');
        const wrongMsg = document.getElementById('wrong');

        function checkPassword() {
            if (passInput.value === CORRECT_PASSWORD) {
                wrongMsg.style.display = 'none';
                loginPart.style.display = 'none';
                signalPart.style.display = 'block';
                startSignalLoop();
            } else {
                wrongMsg.style.display = 'block';
                passInput.value = '';
                wrongMsg.style.animation = 'none';
                requestAnimationFrame(() => {
                    wrongMsg.style.animation = 'shake 0.4s ease';
                });
            }
        }

        loginBtn.addEventListener('click', checkPassword);
        passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPassword(); });

        // SIGNAL GENERATOR
        function startSignalLoop() {
            updateSignal();
            setInterval(updateSignal, 30000);
            setInterval(() => {
                let countElem = document.getElementById('countdown');
                let val = parseInt(countElem.textContent);
                if (val <= 1) {
                    countElem.textContent = 30;
                } else {
                    countElem.textContent = val - 1;
                }
            }, 1000);
        }

        function updateSignal() {
            const signals = ['BIG', 'SMALL', 'EVEN', 'ODD'];
            document.getElementById('predicted').textContent = signals[Math.floor(Math.random() * signals.length)];
            document.getElementById('countdown').textContent = '30';
        }

        // CLOCK
        setInterval(() => {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.getHours().toString().padStart(2, '0') + ":" + 
                                                                 now.getMinutes().toString().padStart(2, '0') + ":" + 
                                                                 now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        // DRAGGABLE LOGIC
        const box = document.getElementById('signalBox');
        let isDragging = false, offX, offY;

        function startDrag(e) {
            isDragging = true;
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            offX = clientX - box.offsetLeft;
            offY = clientY - box.offsetTop;
        }

        function doDrag(e) {
            if (!isDragging) return;
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            box.style.left = (clientX - offX) + 'px';
            box.style.top = (clientY - offY) + 'px';
        }

        box.addEventListener('mousedown', startDrag);
        box.addEventListener('touchstart', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('touchmove', doDrag);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('touchend', () => isDragging = false);
    </script>
</body>
</html>
